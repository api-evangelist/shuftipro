specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Shufti Pro
providerId: shuftipro
created: '2026-06-25'
modified: '2026-06-25'
reconciled: false
tags:
- Identity Verification
- KYC
- KYB
- AML
- Compliance
- FinOps
- Cost Management
- FOCUS
description: >-
  FinOps view of Shufti Pro spend. Shufti bills per verification by service -
  document, face/biometric, address, consent, AML/background-check screening,
  and KYB - under a sales-negotiated contract. Rates vary by region and
  volume and are not publicly published, so per-verification amounts are not
  reconciled here.
notes: >-
  Per-verification rates are sales-led and contract-specific; obtain a rate
  card from Shufti Pro and verify during reconciliation.
sources:
- https://shuftipro.com/pricing/
- https://shuftipro.com/contact-us/
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Shufti Pro
serviceCategory: Identity and Compliance
billingModel:
  pricingCategory: Usage-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
  - Adjustment
focusColumns:
  ServiceName: Shufti Pro Verification API
  ServiceCategory: Identity and Compliance
  ProviderName: Shufti Pro
  PublisherName: Shufti Pro
  InvoiceIssuerName: Shufti Pro
  BillingCurrency: USD
  ChargeCategory: Usage
  PricingCategory: Usage-Based
meters:
- name: document_verifications
  description: Document verifications performed, billed per verification.
  unit: verifications
  aggregation: sum
  dimensions:
  - account
  - service
  - country
- name: face_verifications
  description: Face/biometric verifications performed, billed per verification.
  unit: verifications
  aggregation: sum
  dimensions:
  - account
  - service
- name: address_verifications
  description: Address verifications performed, billed per verification.
  unit: verifications
  aggregation: sum
  dimensions:
  - account
  - service
  - country
- name: consent_verifications
  description: Consent verifications performed, billed per verification.
  unit: verifications
  aggregation: sum
  dimensions:
  - account
  - service
- name: aml_screenings
  description: AML/background-check screenings against watchlists, billed per screening.
  unit: screenings
  aggregation: sum
  dimensions:
  - account
  - service
- name: kyb_verifications
  description: Know Your Business verifications against registries, billed per verification.
  unit: verifications
  aggregation: sum
  dimensions:
  - account
  - service
  - jurisdiction
principles:
- name: Visibility
  description: Pull Shufti Pro back-office usage reports; inspect verification counts per service.
- name: Allocation
  description: Tag verification requests with a reference per workload/product; map to cost centers.
- name: Optimization
  description: >-
    Bundle only the service objects each flow needs; avoid redundant
    re-verifications; delete data when no longer required to limit retention.
- name: Accountability
  description: Assign owners per integration/key; review per-service verification spend monthly.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
